// ── SVG UTILS ─────────────────────────────────────────────────────────────────
const svg = document.getElementById('graph');
const NS  = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function svgText(tag, attrs, text) {
  const e = svgEl(tag, attrs);
  e.textContent = text;
  return e;
}

function nodeById(id) { return DATA.nodes.find(n => n.id === id); }

// Closest face-centre pair between two nodes, returns bezier path string + endpoints.
function edgePath(fromId, toId) {
  const f = nodeById(fromId), t = nodeById(toId);
  const W = NW / 2, H = NH / 2;
  const faces = [
    { dx: 0, dy: -H, dir: 'T' }, { dx: 0,  dy: H,  dir: 'B' },
    { dx: -W, dy: 0, dir: 'L' }, { dx: W,  dy: 0,  dir: 'R' },
  ];
  let best = null, bestD = Infinity;
  for (const ff of faces) {
    for (const tf of faces) {
      const d = Math.hypot((f.x+ff.dx)-(t.x+tf.dx), (f.y+ff.dy)-(t.y+tf.dy));
      if (d < bestD) { bestD = d; best = { ff, tf }; }
    }
  }
  const sx = f.x + best.ff.dx, sy = f.y + best.ff.dy;
  const ex = t.x + best.tf.dx, ey = t.y + best.tf.dy;
  const C = 52;
  const dirOff = { T:[0,-C], B:[0,C], L:[-C,0], R:[C,0] };
  const [c1x,c1y] = dirOff[best.ff.dir];
  const [c2x,c2y] = dirOff[best.tf.dir];
  return {
    d: `M${sx} ${sy} C${sx+c1x} ${sy+c1y} ${ex+c2x} ${ey+c2y} ${ex} ${ey}`,
    mx: (sx + ex) / 2, my: (sy + ey) / 2,
  };
}

// Small loop arc above the node for self-edges.
function selfLoopPath(nodeId, slot) {
  const n = nodeById(nodeId);
  const ox = n.x - 30 + slot * 22;
  const top = n.y - NH / 2;
  return {
    d: `M${ox-16} ${top} C${ox-28} ${top-38} ${ox+28} ${top-38} ${ox+16} ${top}`,
    mx: ox, my: top - 42,
  };
}

function makeMarker(id, color, sz = 8) {
  const m = svgEl('marker', { id, markerWidth: sz, markerHeight: sz,
    refX: sz, refY: sz/2, orient: 'auto' });
  const p = svgEl('path', { d: `M0,0 L0,${sz} L${sz},${sz/2}Z`, fill: color });
  m.appendChild(p); return m;
}

// ── RENDER GRAPH ─────────────────────────────────────────────────────────────
function renderGraph() {
  // Defs
  const defs = document.getElementById('svgDefs');
  defs.innerHTML = '';
  defs.appendChild(makeMarker('arr-static', 'rgba(78,203,113,0.15)', 7));
  DATA.flows.forEach(f => defs.appendChild(makeMarker(`arr-${f.id}`, f.color, 8)));

  svg.innerHTML = '';
  svg.appendChild(defs);

  // Static dependency edges
  const staticG = svgEl('g');
  DATA.staticEdges.forEach(e => {
    const ep = edgePath(e.from, e.to);
    staticG.appendChild(svgEl('path', {
      d: ep.d, fill: 'none', stroke: 'rgba(78,203,113,0.11)',
      'stroke-width': '1.2', 'marker-end': 'url(#arr-static)',
    }));
  });
  svg.appendChild(staticG);

  // Flow edges layer (populated on flow select)
  svg.appendChild(svgEl('g', { id: 'flow-layer' }));
  svg.appendChild(svgEl('g', { id: 'label-layer' }));

  // Nodes
  const nodeG = svgEl('g');
  DATA.nodes.forEach(n => {
    const g = svgEl('g', { id: `node-${n.id}`, transform: `translate(${n.x},${n.y})` });
    g.appendChild(svgEl('rect', {
      id: `rect-${n.id}`,
      x: -NW/2, y: -NH/2, width: NW, height: NH, rx: 6,
      fill: '#101512', stroke: 'rgba(78,203,113,0.18)', 'stroke-width': '1',
    }));
    const lbl = svgEl('text', {
      id: `lbl-${n.id}`, x: 0, y: -7,
      'text-anchor': 'middle', fill: '#c8dcc8',
      'font-size': '12', 'font-family': '"Share Tech Mono",monospace', 'font-weight': 'bold',
    });
    lbl.textContent = n.label;
    g.appendChild(lbl);
    const sub = svgEl('text', {
      x: 0, y: 10, 'text-anchor': 'middle',
      fill: 'rgba(78,203,113,0.35)', 'font-size': '9', 'font-family': '"Share Tech Mono",monospace',
    });
    sub.textContent = n.desc;
    g.appendChild(sub);
    nodeG.appendChild(g);
  });
  svg.appendChild(nodeG);
}

// ── FLOW RENDERING ────────────────────────────────────────────────────────────
function renderFlow() {
  const flowLayer  = document.getElementById('flow-layer');
  const labelLayer = document.getElementById('label-layer');
  flowLayer.innerHTML  = '';
  labelLayer.innerHTML = '';

  // Reset node styles
  DATA.nodes.forEach(n => {
    const r = document.getElementById(`rect-${n.id}`);
    if (r) { r.setAttribute('fill', '#101512'); r.setAttribute('stroke', 'rgba(78,203,113,0.18)'); r.setAttribute('stroke-width', '1'); }
    const l = document.getElementById(`lbl-${n.id}`);
    if (l) l.setAttribute('fill', '#c8dcc8');
  });

  if (!activeFlow) return;
  const f = activeFlow;
  const steps = f.steps.slice(0, activeStep + 1);
  const involvedNodes = new Set();
  const selfSlots = {};

  steps.forEach((step, i) => {
    const isCurrent = i === activeStep;
    const opacity   = isCurrent ? '1' : '0.32';
    const sw        = isCurrent ? '2.5' : '1.5';
    involvedNodes.add(step.from);
    involvedNodes.add(step.to);

    let ep;
    if (step.from === step.to) {
      const slot = selfSlots[step.from] ?? 0;
      selfSlots[step.from] = slot + 1;
      ep = selfLoopPath(step.from, slot);
    } else {
      ep = edgePath(step.from, step.to);
    }

    const path = svgEl('path', {
      d: ep.d, fill: 'none', stroke: f.color,
      'stroke-width': sw, opacity,
      'stroke-dasharray': isCurrent ? '7 3' : 'none',
      'marker-end': `url(#arr-${f.id})`,
    });
    if (isCurrent) path.setAttribute('class', 'active-edge');
    flowLayer.appendChild(path);

    // Label for current step
    if (isCurrent) {
      const bg = svgEl('rect', {
        x: ep.mx - step.label.length * 3, y: ep.my - 10,
        width: step.label.length * 6, height: 15,
        rx: 2, fill: '#0d0f0e', opacity: '0.9',
      });
      const txt = svgEl('text', {
        x: ep.mx, y: ep.my + 2,
        'text-anchor': 'middle', fill: f.color,
        'font-size': '9', 'font-family': '"Share Tech Mono",monospace',
      });
      txt.textContent = step.label;
      labelLayer.appendChild(bg);
      labelLayer.appendChild(txt);
    }
  });

  // Highlight involved nodes
  involvedNodes.forEach(id => {
    const r = document.getElementById(`rect-${id}`);
    if (r) { r.setAttribute('fill', `${f.color}16`); r.setAttribute('stroke', f.color); r.setAttribute('stroke-width', '1.5'); }
    const l = document.getElementById(`lbl-${id}`);
    if (l) l.setAttribute('fill', '#ffffff');
  });

  // Extra highlight for current step's nodes
  const cs = f.steps[activeStep];
  if (cs) {
    [cs.from, cs.to].forEach(id => {
      const r = document.getElementById(`rect-${id}`);
      if (r) { r.setAttribute('fill', `${f.color}28`); r.setAttribute('stroke', f.color); r.setAttribute('stroke-width', '2.2'); }
    });
  }
}

// ── STEP PANEL ────────────────────────────────────────────────────────────────
function renderPanel() {
  const panel = document.getElementById('stepPanel');
  if (!activeFlow) {
    panel.innerHTML = '<div class="step-empty">← Выберите сценарий слева для отображения потока данных</div>';
    return;
  }
  const f = activeFlow, step = f.steps[activeStep], total = f.steps.length;
  panel.innerHTML = `
    <div class="step-header">
      <span class="step-flow-name" style="color:${f.color}">${f.name}</span>
      <span class="step-counter">ШАГ&nbsp;${activeStep+1}&nbsp;/&nbsp;${total}</span>
      <span class="step-hint">← → для навигации</span>
      <div class="step-nav">
        <button id="btnPrev" ${activeStep===0?'disabled':''}>◀ Пред</button>
        <button id="btnNext" ${activeStep===total-1?'disabled':''}>След ▶</button>
      </div>
    </div>
    <div class="step-label">${step.label}</div>
    <div class="step-note">${step.note}</div>
  `;
  document.getElementById('btnPrev').onclick = () => { if (activeStep > 0) { activeStep--; update(); } };
  document.getElementById('btnNext').onclick = () => { if (activeStep < total-1) { activeStep++; update(); } };
}

function update() { renderFlow(); renderPanel(); }

function selectFlow(id) {
  activeFlow = DATA.flows.find(f => f.id === id);
  activeStep = 0;
  document.querySelectorAll('.flow-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.flow === id));
  update();
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  DATA.flows.forEach(f => {
    const btn = document.createElement('button');
    btn.className   = 'flow-btn';
    btn.dataset.flow = f.id;
    btn.title       = f.desc;
    btn.innerHTML   = `<span class="flow-dot" style="background:${f.color}"></span>${f.name}`;
    btn.onclick     = () => selectFlow(f.id);
    sidebar.appendChild(btn);
  });

  const legend = document.createElement('div');
  legend.className = 'sidebar-legend';
  legend.innerHTML = `<b>ОБОЗНАЧЕНИЯ</b>
— — — текущий шаг<br>
──── предыдущие шаги<br>
░░░ зависимости (import)`;
  sidebar.appendChild(legend);
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!activeFlow) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    if (activeStep < activeFlow.steps.length - 1) { activeStep++; update(); }
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (activeStep > 0) { activeStep--; update(); }
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
renderGraph();
renderSidebar();
</script>
