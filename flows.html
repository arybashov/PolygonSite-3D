<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Архитектура потоков — Симулятор дронов</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0e0e10; color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
      font-size: 13px;
    }

    /* ── Header ── */
    header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; color: #eee; font-weight: 600; margin-bottom: 4px; }
    header p  { font-size: 12px; color: #666; margin-bottom: 10px; line-height: 1.4; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; }
    .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
    .leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    /* ── Layout ── */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ── Graph area ── */
    .graph-area { flex: 1; overflow: hidden; position: relative; }
    #graph { width: 100%; height: 100%; display: block; }

    /* ── Left panel (Сценарии) ── */
    .left-panel {
      width: 220px; flex-shrink: 0;
      background: #0b0b0d;
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .back-btn {
      display: flex; align-items: center; gap: 7px;
      margin: 10px 12px 4px; padding: 7px 10px;
      background: none; border: 1px solid rgba(255,255,255,0.1);
      color: #888; font-size: 12px; cursor: pointer; border-radius: 4px;
      text-decoration: none; transition: color 0.12s, border-color 0.12s;
      font-family: inherit;
    }
    .back-btn:hover { color: #ccc; border-color: rgba(255,255,255,0.22); }
    .back-btn-arrow { font-size: 14px; }

    /* ── Right panel (Шаги) ── */
    .right-panel {
      width: 270px; flex-shrink: 0;
      background: #0b0b0d;
      border-left: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-section { display: flex; flex-direction: column; overflow: hidden; }
    .panel-section.flows-section { flex: 1; overflow-y: auto; }
    .panel-section.steps-section { flex: 1; overflow-y: auto; }
    .panel-title {
      font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
      color: #555; text-transform: uppercase;
      padding: 12px 14px 8px;
    }

    /* Flow items */
    .flow-item {
      padding: 9px 14px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s;
    }
    .flow-item:hover { background: rgba(255,255,255,0.04); }
    .flow-item.active { background: rgba(255,255,255,0.05); }
    .flow-item-name { font-size: 12px; font-weight: 500; color: #bbb; margin-bottom: 2px; }
    .flow-item.active .flow-item-name { color: #eee; }
    .flow-item-desc { font-size: 11px; color: #555; line-height: 1.4; }
    .flow-item.active .flow-item-desc { color: #777; }
    .clear-btn {
      margin: 6px 14px 10px; padding: 5px;
      background: none; border: 1px solid rgba(255,255,255,0.1);
      color: #555; font-size: 11px; cursor: pointer; border-radius: 3px;
      text-align: center;
    }
    .clear-btn:hover { color: #999; border-color: rgba(255,255,255,0.2); }

    /* Step items */
    .step-item {
      display: flex; gap: 10px; padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; transition: background 0.12s;
    }
    .step-item:hover { background: rgba(255,255,255,0.03); }
    .step-item.active { background: rgba(255,255,255,0.06); }
    .step-num {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
      background: rgba(255,255,255,0.1); color: #888;
    }
    .step-item.active .step-num { color: #fff; }
    .step-body { flex: 1; min-width: 0; }
    .step-call {
      font-size: 11px; font-family: "SF Mono", "Fira Code", monospace;
      color: #888; margin-bottom: 3px; word-break: break-all;
    }
    .step-item.active .step-call { color: #ccc; }
    .step-note { font-size: 11px; color: #555; line-height: 1.4; }
    .step-item.active .step-note { color: #777; }
    .steps-empty { padding: 20px 14px; font-size: 11px; color: #444; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>Симулятор перехвата дронов — Архитектура потоков</h1>
  <p>Все модули системы. Выберите сценарий слева — увидите путь данных между компонентами.</p>
  <div class="legend" id="legend"></div>
</header>

<div class="body">
  <div class="left-panel">
    <a class="back-btn" href="index.html">
      <span class="back-btn-arrow">←</span> Симулятор
    </a>
    <div class="panel-section flows-section">
      <div class="panel-title">Сценарии</div>
      <div id="flowsList"></div>
      <button class="clear-btn" id="clearBtn" style="display:none">Сбросить выбор</button>
    </div>
  </div>

  <div class="graph-area">
    <svg id="graph" viewBox="0 0 840 400" preserveAspectRatio="xMidYMid meet">
      <defs id="svgDefs"></defs>
    </svg>
  </div>

  <div class="right-panel">
    <div class="panel-section steps-section">
      <div class="panel-title">Шаги</div>
      <div id="stepsList"><div class="steps-empty">← Выберите сценарий</div></div>
    </div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const NW = 128, NH = 44;

const COLS = [
  { id: 'ui',      label: 'Интерфейс',   color: '#5ba3e8', x: 95  },
  { id: 'policy',  label: 'Политика',    color: '#9a8fe0', x: 255 },
  { id: 'core',    label: 'Симуляция',   color: '#4ecb71', x: 415 },
  { id: 'physics', label: 'Физика',      color: '#e8a830', x: 575 },
  { id: 'render',  label: 'Рендер',      color: '#3ecaa5', x: 735 },
];

const NODES = [
  { id: 'index',       col: 'ui',      label: 'index.html',     sub: 'UI · слайдеры · статистика', y: 130 },
  { id: 'app',         col: 'ui',      label: 'app.js',         sub: 'Точка входа · game loop',    y: 230 },
  { id: 'dronePolicy', col: 'policy',  label: 'dronePolicy.js', sub: 'RuleBasedDronePolicy',        y: 180 },
  { id: 'simulation',  col: 'core',    label: 'simulation.js',  sub: 'Дроны · антидроны · камеры', y: 180 },
  { id: 'physics',     col: 'physics', label: 'physics.js',     sub: 'applyPhysics · navigate…',   y: 110 },
  { id: 'math',        col: 'physics', label: 'math.js',        sub: 'clamp · angleDiff · cone',   y: 210 },
  { id: 'constants',   col: 'physics', label: 'constants.js',   sub: 'Числовые константы',         y: 310 },
  { id: 'render',      col: 'render',  label: 'render.js',      sub: 'CanvasRenderer · ElevRend',  y: 130 },
  { id: 'charts',      col: 'render',  label: 'charts.js',      sub: 'Оверлей результатов',        y: 230 },
];

// Assign x from column
NODES.forEach(n => { n.x = COLS.find(c => c.id === n.col).x; });

const STATIC_EDGES = [
  ['index','app'], ['app','simulation'], ['app','render'],
  ['simulation','dronePolicy'], ['simulation','physics'], ['simulation','math'],
  ['simulation','constants'], ['physics','math'], ['dronePolicy','constants'],
  ['dronePolicy','math'], ['render','constants'], ['render','simulation'],
];

const FLOWS = [
  {
    id: 'game_loop', name: 'Игровой цикл', color: '#4ecb71',
    desc: 'Чтение UI → sim.step() → рендер кадра, 50 Гц',
    steps: [
      { from:'index',      to:'app',        call:'readParams() ← input events',      note:'Слайдеры параметров передают значения в app.js через DOM-события.' },
      { from:'app',        to:'simulation', call:'sim.setParams(params)',             note:'Параметры (скорости, количество) обновляются в симуляции перед каждым тиком.' },
      { from:'app',        to:'simulation', call:'sim.step()',                        note:'Каждые 20 мс: один полный шаг — дроны, камеры, антидроны, взрывы.' },
      { from:'simulation', to:'dronePolicy',call:'policy.getAction(sim, drone)',      note:'Для каждого живого дрона симуляция запрашивает действие у политики.' },
      { from:'simulation', to:'physics',    call:'navigateFixedWingToPoint() [дрон]', note:'Физика дрона: тяга вперёд, сопротивление, разворот.' },
      { from:'simulation', to:'physics',    call:'navigateToPoint() [антидрон]',      note:'Физика антидрона: мультикоптер, 3D-тяга, независимые каналы.' },
      { from:'app',        to:'render',     call:'renderer.draw()',                   note:'Рендер верхнего вида и высотного среза сразу после step().' },
      { from:'render',     to:'simulation', call:'sim.drones / sim.cameras…',         note:'Рендер читает состояние симуляции напрямую через ссылки на массивы.' },
    ],
  },
  {
    id: 'detection', name: 'Обнаружение дрона', color: '#e8a830',
    desc: 'Камера фиксирует дрон → назначает антидрон',
    steps: [
      { from:'simulation', to:'math',       call:'inCone3d(cam, drone, camRange)',    note:'Проверка: 3D дальность + горизонтальный пеленг ±25° + |Δz| < 200 м.' },
      { from:'simulation', to:'constants',  call:'CAM_FOV=50°  CAMERA_Z=15м',        note:'Параметры конуса берутся из constants.js. Мачта 15 м, FOV 50°.' },
      { from:'simulation', to:'simulation', call:'anti.pendingTarget = drone',        note:'Свободному антидрону назначается цель. mode → "waiting". Cooldown камеры 3 с.' },
      { from:'simulation', to:'simulation', call:'anti.launchDelay -= dt',            note:'Отсчёт задержки вылета (adelay). На канвасе показан дугой.' },
      { from:'simulation', to:'simulation', call:'anti.mode = "intercept"  → взлёт', note:'После отсчёта антидрон взлетает и летит к последней известной позиции.' },
    ],
  },
  {
    id: 'drone_attack', name: 'Атака дрона', color: '#5ba3e8',
    desc: 'Подъём 50 м → пике → поражение цели',
    steps: [
      { from:'dronePolicy',to:'constants',  call:'ATTACK_COMMIT_DIST=500м',          note:'Если до цели < 500 м и курс позволяет — начать заход.' },
      { from:'dronePolicy',to:'math',       call:'canCommitAttack(): angleDiff()',    note:'Проверка ошибки курса (<55°), дистанций подъёма/снижения и разворота.' },
      { from:'dronePolicy',to:'simulation', call:'{mode:"climb", tz:50}',            note:'Политика возвращает команду: набрать высоту 50 м. mode="climb".' },
      { from:'simulation', to:'physics',    call:'navigateFixedWingToPoint(tz=50)',   note:'Физика ведёт дрон вверх. targetVz = (50−z)×3, clamp к maxVz.' },
      { from:'dronePolicy',to:'simulation', call:'{mode:"dive", tz:0}',              note:'Высота ≥ 45 м → пике. mode="dive". Высотный пол отключён.' },
      { from:'simulation', to:'physics',    call:'navigateFixedWingToPoint(tz=0)',    note:'Физика направляет к земле. Гравитация помогает. Максимальная скорость.' },
      { from:'simulation', to:'simulation', call:'markDroneHitTarget()  → взрыв',   note:'dist2D < 25 м && z ≤ 5 м → цель поражена. drone.mode="hit".' },
    ],
  },
  {
    id: 'intercept', name: 'Перехват антидроном', color: '#e04b4b',
    desc: 'Обнаружение → упреждение → proximity fuse',
    steps: [
      { from:'simulation', to:'math',       call:'inCone3dFull(anti, drone)',         note:'Бортовая камера: конус 55°, наклонён по pitch=atan2(vz,vH). Dot product.' },
      { from:'simulation', to:'simulation', call:'anti.mode = "chase"',              note:'Дрон в конусе → chase. lastKnownX/Y/Z обновляется каждый тик.' },
      { from:'simulation', to:'math',       call:'distance3d() → tLead',             note:'Аналитический корень |relPos+v·t|=speed·t. Clamp к [0, 2.5 с].' },
      { from:'simulation', to:'simulation', call:'aimPoint = pos + vel × tLead',     note:'Точка прицеливания: будущее положение дрона через tLead секунд.' },
      { from:'simulation', to:'physics',    call:'navigateToPoint(anti, aimPoint)',   note:'Антидрон летит к aimPoint. gz ≥ 15 м (safety off при dist ≤ 20 м).' },
      { from:'physics',    to:'math',       call:'angleDiff() · clamp() · drag',     note:'3D тяга, квадратичное сопротивление, центростремительное ограничение.' },
      { from:'simulation', to:'simulation', call:'markDroneIntercepted()  < 20 м',  note:'Proximity fuse: проверка до и после физ. шага. Оба уничтожены.' },
    ],
  },
  {
    id: 'evasion', name: 'Уклонение дрона', color: '#9a8fe0',
    desc: 'Угроза в сфере 600 м → перпендикулярный маршрут',
    steps: [
      { from:'dronePolicy',to:'math',       call:'distance3d(drone,anti) ≤ 600м',    note:'findThreat(): сфера 600 м. Живой антидрон не на базе — угроза.' },
      { from:'dronePolicy',to:'math',       call:'computeEvadeWaypoint()',            note:'predPos = anti.pos + anti.vel × timeToCross. timeToCross = dist/(vD+vA).' },
      { from:'dronePolicy',to:'constants',  call:'CRUISE_ALT · MIN_ALT · MAX_ALT',   note:'Высота уклонения: ±40 м от CRUISE_ALT по стороне угрозы. Фиксируется на evade-эпизод.' },
      { from:'dronePolicy',to:'simulation', call:'{intent:"evade", tx,ty,tz}',       note:'Вейпоинт перпендикулярен линии угрозы, на стороне ближе к цели атаки.' },
      { from:'simulation', to:'physics',    call:'navigateFixedWingToPoint(evadeWpt)',note:'alignFactor=max(0.65,(1+cos(yawErr))/2): скорость снижена в развороте.' },
    ],
  },
  {
    id: 'lost_target', name: 'Потеря цели', color: '#3ecaa5',
    desc: 'Grace 3 с → lastknown → поиск на 45 м',
    steps: [
      { from:'simulation', to:'math',       call:'!inCone3dFull()  × 3.0 с',         note:'Дрон вышел из конуса. Grace-период 3.0 с: летим к предсказанной точке.' },
      { from:'simulation', to:'simulation', call:'mode = "lastknown"',               note:'Летим к lastKnownX/Y/Z — последней зафиксированной позиции цели.' },
      { from:'simulation', to:'physics',    call:'navigateToPoint(lastKnown)',        note:'Обычная физика. gz ≥ 15 м. Полная скорость.' },
      { from:'simulation', to:'simulation', call:'mode = "recoverSearch"',           note:'Прибыл в точку потери → набирает высоту 45 м, 25 % горизонтальной скорости.' },
      { from:'simulation', to:'simulation', call:'mode = "circle"  @ 45 м',         note:'Барражирование кругами. Конус сканирует окружение.' },
      { from:'simulation', to:'physics',    call:'applyPhysics(targetVz=(45−z)×3)',  note:'Пропорциональный подъём без скачков vz, если ниже 45 м.' },
    ],
  },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeFlow  = null;
let activeStep  = null; // null = all, number = highlight one

// ── SVG ───────────────────────────────────────────────────────────────────────
const svg = document.getElementById('graph');
const NS  = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}
function txt(tag, attrs, text) { const e=el(tag,attrs); e.textContent=text; return e; }
function nodeById(id) { return NODES.find(n=>n.id===id); }
function colById(id)  { return COLS.find(c=>c.id===id); }

// ── EDGE PATH ─────────────────────────────────────────────────────────────────
let selfSlotMap = {};

function edgePath(fromId, toId, selfSlot=0) {
  if (fromId === toId) {
    const n = nodeById(fromId);
    const ox = n.x - 30 + selfSlot * 24;
    const top = n.y - NH/2;
    return {
      d: `M${ox-14} ${top} C${ox-26} ${top-34} ${ox+26} ${top-34} ${ox+14} ${top}`,
      mx: ox, my: top - 38,
    };
  }
  const f = nodeById(fromId), t = nodeById(toId);
  const W = NW/2, H = NH/2;
  const faces = [
    {dx:0,dy:-H,dir:'T'},{dx:0,dy:H,dir:'B'},
    {dx:-W,dy:0,dir:'L'},{dx:W,dy:0,dir:'R'},
  ];
  let best=null, bestD=Infinity;
  for (const ff of faces) for (const tf of faces) {
    const d = Math.hypot((f.x+ff.dx)-(t.x+tf.dx),(f.y+ff.dy)-(t.y+tf.dy));
    if (d<bestD) { bestD=d; best={ff,tf}; }
  }
  const sx=f.x+best.ff.dx, sy=f.y+best.ff.dy;
  const ex=t.x+best.tf.dx, ey=t.y+best.tf.dy;
  const C=50;
  const off = {T:[0,-C],B:[0,C],L:[-C,0],R:[C,0]};
  const [c1x,c1y]=off[best.ff.dir], [c2x,c2y]=off[best.tf.dir];
  return {
    d:`M${sx} ${sy} C${sx+c1x} ${sy+c1y} ${ex+c2x} ${ey+c2y} ${ex} ${ey}`,
    mx:(sx+ex)/2, my:(sy+ey)/2,
  };
}

function makeMarker(id,color,sz=8) {
  const m=el('marker',{id,markerWidth:sz,markerHeight:sz,refX:sz,refY:sz/2,orient:'auto'});
  m.appendChild(el('path',{d:`M0,0 L0,${sz} L${sz},${sz/2}Z`,fill:color}));
  return m;
}

// ── RENDER GRAPH ─────────────────────────────────────────────────────────────
function renderGraph() {
  svg.innerHTML='';
  const defs=el('defs'); svg.appendChild(defs);
  defs.appendChild(makeMarker('arr-static','rgba(255,255,255,0.08)',7));
  FLOWS.forEach(f=>defs.appendChild(makeMarker(`arr-${f.id}`,f.color,8)));

  // Column backgrounds + headers
  const colBg=el('g'); svg.appendChild(colBg);
  COLS.forEach((col,i) => {
    const x=col.x-NW/2-12, w=NW+24;
    colBg.appendChild(el('rect',{x,y:0,width:w,height:400,
      fill: i%2===0 ? 'rgba(255,255,255,0.01)' : 'none'}));
    colBg.appendChild(txt('text',{
      x:col.x, y:22, 'text-anchor':'middle',
      fill:col.color, 'font-size':'10', 'font-weight':'600',
      'letter-spacing':'1', opacity:'0.7',
      'font-family':'-apple-system,sans-serif',
    }, col.label.toUpperCase()));
  });

  // Static edges
  const staticG=el('g',{id:'static-edges'});
  STATIC_EDGES.forEach(([a,b])=>{
    const ep=edgePath(a,b);
    staticG.appendChild(el('path',{d:ep.d,fill:'none',
      stroke:'rgba(255,255,255,0.07)','stroke-width':'1',
      'marker-end':'url(#arr-static)'}));
  });
  svg.appendChild(staticG);

  // Flow edges (redrawn on select)
  svg.appendChild(el('g',{id:'flow-edges'}));
  svg.appendChild(el('g',{id:'flow-nums'}));

  // Nodes
  const nodeG=el('g',{id:'node-layer'});
  NODES.forEach(n=>{
    const col=colById(n.col);
    const g=el('g',{id:`node-${n.id}`,transform:`translate(${n.x},${n.y})`});
    g.appendChild(el('rect',{id:`rect-${n.id}`,
      x:-NW/2,y:-NH/2,width:NW,height:NH,rx:6,
      fill:'#141417',stroke:'rgba(255,255,255,0.1)','stroke-width':'1'}));
    // Top accent bar
    g.appendChild(el('rect',{
      x:-NW/2,y:-NH/2,width:NW,height:3,rx:3,
      fill:col.color,opacity:'0.3',id:`bar-${n.id}`}));
    g.appendChild(txt('text',{id:`lbl-${n.id}`,
      x:0,y:-5,'text-anchor':'middle',fill:'#ccc',
      'font-size':'11','font-weight':'600',
      'font-family':'-apple-system,sans-serif'},n.label));
    g.appendChild(txt('text',{x:0,y:10,'text-anchor':'middle',fill:'#555',
      'font-size':'9','font-family':'-apple-system,sans-serif'},n.sub));
    nodeG.appendChild(g);
  });
  svg.appendChild(nodeG);
}

// ── RENDER FLOW OVERLAY ───────────────────────────────────────────────────────
function renderOverlay() {
  const edgeLayer = document.getElementById('flow-edges');
  const numLayer  = document.getElementById('flow-nums');
  edgeLayer.innerHTML=''; numLayer.innerHTML='';

  // Reset node styles
  NODES.forEach(n=>{
    const r=document.getElementById(`rect-${n.id}`);
    const l=document.getElementById(`lbl-${n.id}`);
    const b=document.getElementById(`bar-${n.id}`);
    if (!activeFlow) {
      r.setAttribute('fill','#141417');
      r.setAttribute('stroke','rgba(255,255,255,0.1)');
      r.setAttribute('opacity','1');
      l.setAttribute('fill','#ccc');
      b.setAttribute('opacity','0.3');
    } else {
      r.setAttribute('opacity','0.22');
      l.setAttribute('fill','#444');
      b.setAttribute('opacity','0.08');
    }
  });

  if (!activeFlow) return;

  const f=activeFlow;
  const involvedNodes=new Set();
  selfSlotMap={};

  f.steps.forEach((step,i)=>{
    involvedNodes.add(step.from);
    involvedNodes.add(step.to);
  });

  // Highlight involved nodes
  involvedNodes.forEach(id=>{
    const r=document.getElementById(`rect-${id}`);
    const l=document.getElementById(`lbl-${id}`);
    const b=document.getElementById(`bar-${id}`);
    r.setAttribute('fill','#1e1e24');
    r.setAttribute('stroke',f.color);
    r.setAttribute('stroke-width','1.5');
    r.setAttribute('opacity','1');
    l.setAttribute('fill','#eee');
    b.setAttribute('opacity','0.6');
  });

  // Draw edges + step numbers
  f.steps.forEach((step,i)=>{
    const isSelf = step.from === step.to;
    const slot = selfSlotMap[step.from+step.to] ?? 0;
    selfSlotMap[step.from+step.to] = slot+1;
    const ep = edgePath(step.from, step.to, slot);

    const isActive = activeStep === i;
    const dimmed   = activeStep !== null && !isActive;
    const alpha    = dimmed ? 0.25 : 1;

    // Edge path
    const path=el('path',{d:ep.d,fill:'none',stroke:f.color,
      'stroke-width': isActive ? '2.5' : '1.5',
      opacity: String(alpha),
      'marker-end':`url(#arr-${f.id})`});
    if (isActive) {
      path.style.animation='dash 0.5s linear infinite';
      path.setAttribute('stroke-dasharray','7 3');
    }
    edgeLayer.appendChild(path);

    // Step number circle
    const nr = 11;
    const ncol = dimmed ? '#333' : f.color;
    const ntcol = dimmed ? '#555' : '#000';
    const nbg=el('circle',{cx:ep.mx,cy:ep.my,r:nr,
      fill: isActive ? f.color : '#1a1a1e',
      stroke: dimmed ? '#333' : f.color,
      'stroke-width':'1.5',opacity:String(alpha)});
    const ntxt=txt('text',{x:ep.mx,y:ep.my+4,'text-anchor':'middle',
      fill: isActive ? '#000' : (dimmed ? '#444' : f.color),
      'font-size':'10','font-weight':'700',
      'font-family':'-apple-system,sans-serif',
      opacity:String(alpha)},String(i+1));
    numLayer.appendChild(nbg);
    numLayer.appendChild(ntxt);
  });
}

// ── RIGHT PANEL ───────────────────────────────────────────────────────────────
function renderFlowsList() {
  const list=document.getElementById('flowsList');
  list.innerHTML='';
  FLOWS.forEach(f=>{
    const item=document.createElement('div');
    item.className='flow-item'+(activeFlow?.id===f.id?' active':'');
    item.style.borderLeftColor=activeFlow?.id===f.id ? f.color : 'transparent';
    item.innerHTML=`<div class="flow-item-name">${f.name}</div>
                    <div class="flow-item-desc">${f.desc}</div>`;
    item.onclick=()=>selectFlow(f.id);
    list.appendChild(item);
  });
  document.getElementById('clearBtn').style.display=activeFlow?'block':'none';
}

function renderStepsList() {
  const list=document.getElementById('stepsList');
  if (!activeFlow) {
    list.innerHTML='<div class="steps-empty">← Выберите сценарий</div>';
    return;
  }
  list.innerHTML='';
  activeFlow.steps.forEach((step,i)=>{
    const isActive=activeStep===i;
    const item=document.createElement('div');
    item.className='step-item'+(isActive?' active':'');
    item.innerHTML=`
      <div class="step-num" style="${isActive?`background:${activeFlow.color};color:#000`:''}">
        ${i+1}
      </div>
      <div class="step-body">
        <div class="step-call">${step.from} → ${step.to}<br>${step.call}</div>
        <div class="step-note">${step.note}</div>
      </div>`;
    item.onclick=()=>{ activeStep=isActive?null:i; renderOverlay(); renderStepsList(); };
    list.appendChild(item);
  });
}

function selectFlow(id) {
  if (activeFlow?.id===id) { activeFlow=null; activeStep=null; }
  else { activeFlow=FLOWS.find(f=>f.id===id); activeStep=null; }
  renderFlowsList();
  renderStepsList();
  renderOverlay();
}

// ── LEGEND ────────────────────────────────────────────────────────────────────
function renderLegend() {
  const leg=document.getElementById('legend');
  COLS.forEach(c=>{
    leg.innerHTML+=`<span class="leg">
      <span class="leg-dot" style="background:${c.color};opacity:0.7"></span>${c.label}
    </span>`;
  });
  leg.innerHTML+=`<span class="leg" style="margin-left:8px">
    <span class="leg-dot" style="background:rgba(255,255,255,0.2)"></span>Зависимости (import)
  </span>`;
}

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if (!activeFlow) return;
  const n=activeFlow.steps.length;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') {
    e.preventDefault();
    activeStep=activeStep===null?0:Math.min(activeStep+1,n-1);
  } else if (e.key==='ArrowLeft'||e.key==='ArrowUp') {
    e.preventDefault();
    activeStep=activeStep===null||activeStep===0?null:activeStep-1;
  } else if (e.key==='Escape') { activeStep=null; }
  else return;
  renderOverlay(); renderStepsList();
});

document.getElementById('clearBtn').onclick=()=>selectFlow(activeFlow?.id);

// ── CSS for edge animation ────────────────────────────────────────────────────
const style=document.createElement('style');
style.textContent='@keyframes dash{to{stroke-dashoffset:-18}}';
document.head.appendChild(style);

// ── INIT ──────────────────────────────────────────────────────────────────────
renderLegend();
renderGraph();
renderFlowsList();
</script>
</body>
</html>
